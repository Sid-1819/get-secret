events {
    worker_connections 1024;
}

http {
    log_format mtail_format
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'rt=$request_time uct=$upstream_connect_time '
        'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx-mtail/access.log mtail_format buffer=64k flush=1s;
    error_log /var/log/nginx/error.log warn;

    upstream backend {
        server backend:3000;
    }

    # Route GET /s/:slug to SPA when browser requests HTML; otherwise proxy to API.
    map $http_accept $is_html {
        default 0;
        "~*text/html" 1;
    }

    map "$request_method:$is_html" $proxy_to_backend {
        default 1;
        "GET:0" 1;
        "GET:1" 0;
        "HEAD:1" 0;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location = /metrics {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /s {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /s/multipart {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 2m;
        }

        location ~ ^/s/.+ {
            error_page 418 = @backend;
            if ($proxy_to_backend = 1) {
                return 418;
            }
            try_files $uri /index.html;
        }

        location @backend {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
