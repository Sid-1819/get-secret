name: Feature request
description: Suggest an improvement or new capability for the get-secret API backend
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check the [roadmap](https://github.com/Sid-1819/secureShare/blob/main/ROADMAP.md) first — your idea may already be planned.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Who benefits?
      placeholder: e.g. Self-hosters need Traefik config examples to terminate TLS in front of the API.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API / endpoints
        - Encryption & secret lifecycle
        - Rate limiting & abuse prevention
        - Self-hosting & deployment
        - Observability (metrics, logging, health)
        - Developer experience (docs, CLI, SDK)
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this.
          required: false
        - label: I have searched existing issues for duplicates.
          required: true
