name: Close issue on merge

on:
  pull_request:
    types: [closed]

jobs:
  close-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Close issue linked by branch name
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const match =
              branch.match(/^(\d+)-/) ?? branch.match(/^issue-(\d+)/i);
            if (!match) {
              core.info(`Branch "${branch}" does not match an issue branch pattern; skipping.`);
              return;
            }

            const issueNumber = parseInt(match[1], 10);
            const { owner, repo } = context.repo;

            try {
              const { data: issue } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: issueNumber,
              });
              if (issue.state === 'closed') {
                core.info(`Issue #${issueNumber} is already closed.`);
                return;
              }
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                state: 'closed',
              });
              core.info(`Closed issue #${issueNumber} after merging ${branch}.`);
            } catch (error) {
              if (error.status === 404) {
                core.info(`Issue #${issueNumber} not found; skipping.`);
                return;
              }
              throw error;
            }
